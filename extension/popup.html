<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    body {
      width: 260px;
      margin: 0;
      padding: 14px;
      font-family: system-ui, sans-serif;
      font-size: 13px;
      color: #111;
      background: #fff;
    }
    h1 {
      margin: 0 0 8px 0;
      font-size: 15px;
    }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid #eee;
    }
    .row .label { font-weight: 600; }
    .row .hint { color: #666; font-size: 11px; margin-top: 2px; }
    /* Toggle switch */
    .switch { position: relative; width: 44px; height: 24px; flex: 0 0 auto; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; cursor: pointer; inset: 0;
      background: #ccc; border-radius: 24px; transition: background .15s;
    }
    .slider::before {
      content: ""; position: absolute; height: 18px; width: 18px;
      left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: transform .15s;
    }
    .switch input:checked + .slider { background: #2e7d32; }
    .switch input:checked + .slider::before { transform: translateX(20px); }
    .btn {
      flex: 0 0 auto; cursor: pointer;
      border: 1px solid #2e7d32; background: #2e7d32; color: #fff;
      border-radius: 6px; padding: 5px 12px; font: inherit;
    }
    .btn.stop { background: #c62828; border-color: #c62828; }
    .btn:disabled { background: #bbb; border-color: #bbb; cursor: default; }
    #output {
      margin-top: 10px;
      padding: 8px;
      border-radius: 6px;
      background: #f3f3f3;
      color: #333;
      white-space: pre-wrap;
    }
    ol {
      margin: 8px 0;
      padding-left: 18px;
    }
    li { margin-bottom: 4px; }
    kbd {
      background: #eee;
      border: 1px solid #ccc;
      border-radius: 3px;
      padding: 1px 5px;
      font-family: inherit;
    }
  </style>
</head>
<body>
  <h1>AlphaOCR</h1>

  <div class="row">
    <div>
      <div class="label">Enable snipping</div>
      <div class="hint">When off, <kbd>Shift</kbd> behaves normally.</div>
    </div>
    <label class="switch">
      <input type="checkbox" id="enabled-toggle" />
      <span class="slider"></span>
    </label>
  </div>

  <div class="row">
    <div>
      <div class="label">Backend</div>
      <div class="hint" id="backend-status">Checking…</div>
    </div>
    <button id="start-backend" class="btn">Start</button>
  </div>

  <ol>
    <li>Toggle <strong>Enable snipping</strong> on.</li>
    <li>Press <kbd>Shift</kbd>, then drag a box over the Japanese text.</li>
    <li>Release — the translation appears near the selection.</li>
  </ol>

  <div id="output">Waiting for selection…</div>
  <script src="popup.js"></script>
</body>
</html>
